model:
  seq_len: 128
  d_model: 128
  n_layers: 3
  n_heads: 4
  d_ff: 512
  dropout: 0.1
train:
  stage: pretrain
  train_path: data/processed/pretrain_train.pt
  valid_path: data/processed/pretrain_valid.pt
  out_dir: runs/pretrain_tiny
  batch_size: 8
  steps: 200
  lr: 3.0e-4
  warmup_steps: 20
  eval_every: 50
  save_every: 100
  log_every: 10
  amp: true
sampling:
  steps: 24
  max_new_tokens: 64
  temperature: 0.9
  top_k: 50
  top_p: 0.95
