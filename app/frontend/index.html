<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SEDD Demo</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260704-mini-models" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>SEDD Demo</h1>
          </div>
        </header>

        <section class="panel active" id="visualize-panel">
          <label for="model-select">Model</label>
          <select id="model-select"></select>
          <p class="model-meta" id="model-meta"></p>
          <div class="mode-switch" aria-label="Generation mode">
            <button type="button" data-mode="generate">Generate</button>
            <button type="button" data-mode="infill" class="active">Infill</button>
          </div>
          <label id="prompt-label" for="viz-prompt">Text with masks</label>
          <textarea id="viz-prompt" rows="4">A bow and arrow is a traditional weapon that [MASK] and can be fired by a trained archer.</textarea>
          <div class="prompt-examples" id="prompt-examples"></div>
          <div class="controls">
            <label>Steps <input id="viz-steps" type="number" min="1" max="64" value="8" /></label>
            <label><span id="token-control-label">Mask tokens</span> <input id="viz-tokens" type="number" min="1" max="96" value="4" /></label>
            <label>Batch <input id="viz-batch" type="number" min="1" max="8" value="4" /></label>
          </div>
          <button id="visualize">Run infill trace</button>
        </section>
      </section>

      <aside class="output">
        <div class="output-head">
          <h2>Denoising</h2>
          <div class="output-actions">
            <button id="replay" disabled>Replay</button>
            <button id="clear">Clear</button>
          </div>
        </div>
        <pre id="result"></pre>
        <div id="trace"></div>
      </aside>
    </main>
    <script src="/static/main.js?v=20260704-mini-models"></script>
  </body>
</html>
